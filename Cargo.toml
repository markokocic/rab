[package]
name = "rab"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
futures = "0.3"
async-trait = "0.1"
colored = "3"
genai = { version = "0.6", default-features = false, features = ["native-tls"] }
directories = "6"
async-stream = "0.3"
ratatui = "0.30"
