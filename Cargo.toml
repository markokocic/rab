[package]
name = "rab"
version = "0.1.0"
edition = "2024"

[dev-dependencies]
tempfile = "3"

[dependencies]
tokio = { version = "1", features = ["full", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
futures = "0.3"
async-trait = "0.1"
colored = "3"
genai = "0.6"
directories = "6"
async-stream = "0.3"
crossterm = "0.29"
rustls = "0.23"
webpki-roots = "1"
reqwest = { version = "0.13", default-features = false, features = ["rustls", "json", "stream", "gzip", "charset", "http2", "socks", "system-proxy"] }
unicode-segmentation = "1"
unicode-width = "0.2"
libc = "0.2"
diff = "0.1"
pulldown-cmark = "0.13.4"
syntect = { version = "5.3.0", optional = true }

[features]
default = ["syntect"]
syntect = ["dep:syntect"]
